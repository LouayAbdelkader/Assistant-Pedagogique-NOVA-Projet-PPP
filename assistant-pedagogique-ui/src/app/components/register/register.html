<div class="min-h-screen w-full flex items-center justify-center bg-slate-100 p-6">
  <div class="max-w-4xl w-full bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-200 overflow-hidden flex flex-col md:flex-row min-h-[600px]">

    <!-- Panneau latéral -->
    <div class="hidden md:flex md:w-[48%] bg-[#042C53] p-11 flex-col justify-between relative overflow-hidden text-blue-100">
      <div class="absolute -top-16 -right-16 w-52 h-52 rounded-full bg-blue-500/10"></div>
      <div class="absolute -bottom-12 -left-12 w-36 h-36 rounded-full bg-amber-300/[0.07]"></div>

      <div class="relative">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center overflow-hidden">
            <img src="icon.jpg" alt="Nova" class="w-full h-full object-cover rounded-lg">
          </div>
          <div>
            <p class="text-[11px] tracking-[2.5px] text-blue-300 font-medium">ASSISTANT IA</p>
            <p class="text-3xl font-medium text-white leading-tight">Nova</p>
          </div>
        </div>

        <h2 class="mt-10 text-3xl font-medium text-white leading-snug">
          Rejoignez<br>la communauté
        </h2>
        <div class="w-11 h-[3px] bg-amber-300 rounded mt-5"></div>

        <ul class="mt-8 space-y-3.5 text-sm text-blue-200">
          <li class="flex items-center gap-3">
            <svg class="w-5 h-5 text-amber-300 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            Suivi personnalisé
          </li>
          <li class="flex items-center gap-3">
            <svg class="w-5 h-5 text-amber-300 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            Réponses instantanées
          </li>
          <li class="flex items-center gap-3">
            <svg class="w-5 h-5 text-amber-300 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            100% gratuit pour les étudiants
          </li>
        </ul>
      </div>

      <div class="relative flex gap-3 items-start border-t border-white/10 pt-5">
        <svg class="w-5 h-5 text-amber-300 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M9.983 3v7.391c0 5.704-3.731 9.57-8.983 10.609l-.995-2.151c2.432-.917 3.995-3.638 3.995-5.849h-4v-10h9.983zm14.017 0v7.391c0 5.704-3.748 9.57-9 10.609l-.996-2.151c2.433-.917 3.996-3.638 3.996-5.849h-3.983v-10h9.983z"/></svg>
        <p class="text-sm italic text-blue-300 leading-relaxed">L'IA au service de votre réussite académique.</p>
      </div>
    </div>

    <!-- Formulaire -->
    <div class="flex-1 p-8 md:p-10 flex flex-col justify-center">
      <h1 class="text-2xl font-medium text-slate-800">Inscription</h1>
      <p class="text-sm text-slate-500 mt-1.5">Créez votre compte en quelques secondes</p>

      <!-- Message d'erreur -->
      <div *ngIf="errorMessage" class="mt-5 flex items-center gap-2.5 p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
        {{ errorMessage }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
        <!-- Nom -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Nom complet</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
            <input formControlName="nom" type="text" class="input-field pl-11 h-11" placeholder="Jean Dupont">
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Email</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            <input formControlName="email" type="email" class="input-field pl-11 h-11" placeholder="jean@exemple.com">
          </div>
        </div>

        <!-- Rôle (boutons) -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Vous êtes ?</label>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" (click)="registerForm.patchValue({ role: 'ETUDIANT' })"
              [ngClass]="registerForm.value.role === 'ETUDIANT'
                ? 'border-2 border-[#042C53] bg-blue-50 text-[#042C53]'
                : 'border border-slate-200 text-slate-500'"
              class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-medium transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.636 50.636 0 00-2.658-.813A59.906 59.906 0 0112 3.493a59.903 59.903 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/></svg>
              Étudiant
            </button>
            <button type="button" (click)="registerForm.patchValue({ role: 'ENSEIGNANT' })"
              [ngClass]="registerForm.value.role === 'ENSEIGNANT'
                ? 'border-2 border-[#042C53] bg-blue-50 text-[#042C53]'
                : 'border border-slate-200 text-slate-500'"
              class="flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-medium transition-colors">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6"/></svg>
              Enseignant
            </button>
          </div>
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-2">Mot de passe</label>
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
            <input formControlName="password" [type]="showPassword ? 'text' : 'password'" class="input-field pl-11 pr-11 h-11" placeholder="••••••••">
            <button type="button" (click)="togglePasswordVisibility()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#042C53] transition-colors">
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full flex items-center justify-center gap-2 h-12 bg-[#042C53] hover:bg-[#0C447C] disabled:opacity-60 text-white font-medium rounded-xl transition-colors">
          {{ isLoading ? 'Inscription en cours...' : "Commencer l'aventure" }}
          <svg *ngIf="!isLoading" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </form>

      <p class="mt-5 text-center text-sm text-slate-500">
        Déjà membre ? <a routerLink="/login" class="text-[#185FA5] font-medium hover:underline">Se connecter</a>
      </p>
    </div>
  </div>
</div>
