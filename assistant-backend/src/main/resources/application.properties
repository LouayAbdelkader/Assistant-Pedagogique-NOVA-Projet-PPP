# Configuration de l'application Spring Boot
spring.application.name=assistant-backend

# ==========================================
# CONNEXION ¿ LA BASE DE DONN…ES MySQL (XAMPP)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/assistant_ts_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# ddl-auto=update : Met ‡ jour automatiquement le schÈma de la base
# Attention : En production, utilisez "validate" ou "none"
spring.jpa.hibernate.ddl-auto=update

# Affiche les requÍtes SQL dans la console (utile pour le dÈbogage)
spring.jpa.show-sql=true